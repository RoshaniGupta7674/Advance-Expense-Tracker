{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <h2>Login</h2>
    
    <form method="POST">
    {% csrf_token %}
    
    <input type="text" name="username" placeholder="Username" required>
    <br><br>
    
    <input type="password" name="password" placeholder="Password" required>
    <br><br>
    
    <button type="submit" class="btn" style="width: 100%;">Login</button>
    
    </form>
    
    <br>
    <p>Forgot your password? <a href="{% url 'custom_forgot_password' %}" style="color: #38bdf8;">Recover it here</a></p>
    <p>New user? <a href="{% url 'register' %}" style="color: #38bdf8;">Register here</a></p>
</div>
{% endblock %}
