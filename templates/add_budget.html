{% extends "base.html" %}

{% block content %}
<div class="dashboard-header" style="margin-bottom: 25px; display:flex; justify-content:space-between; align-items:center;">
    <div>
        <h1><i class="fas fa-chart-pie"></i> Set Monthly Budget</h1>
        <p>Define a spending limit for a specific category</p>
    </div>
</div>

<div class="auth-container" style="width: 100%; max-width: 500px; padding: 35px; background: var(--card-bg); border-top: 5px solid var(--accent-blue); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin: 0 auto;">
    
    <form method="post">
        {% csrf_token %}
        
        {% if form.errors %}
            <div style="color:var(--danger); font-size:12px; margin-bottom:15px;">{{ form.errors }}</div>
        {% endif %}

        <div style="margin-bottom: 15px;">
            <label style="color:var(--text-muted); font-size: 14px; font-weight:600; display:block; margin-bottom:5px;">Category</label>
            {{ form.category }}
             <a href="{% url 'add_category' %}" style="display:inline-block; margin-top:5px; font-size: 13px; color: var(--accent-blue); text-decoration:none;"><i class="fas fa-plus"></i> Add Category</a>
        </div>
        
        <div style="margin-bottom: 15px;">
             <label style="color:var(--text-muted); font-size: 14px; font-weight:600; display:block; margin-bottom:5px;">Spending Limit Extent</label>
            {{ form.limit }}
        </div>
        
        <div style="margin-bottom: 25px;">
             <label style="color:var(--text-muted); font-size: 14px; font-weight:600; display:block; margin-bottom:5px;">Applicable Month (Select any day in the month)</label>
            {{ form.month }}
        </div>

        <button type="submit" class="btn" style="width:100%; background: linear-gradient(45deg, var(--accent-blue), var(--accent-teal)); font-size: 16px; font-weight: bold; border-radius: 8px; padding: 12px; box-shadow: 0 4px 15px rgba(52,152,219,0.3); border:none;"><i class="fas fa-save"></i> Save Budget</button>
    </form>
</div>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
{% endblock %}
