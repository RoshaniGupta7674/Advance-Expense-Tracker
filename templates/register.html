{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <h2>Register</h2>
    
    <form method="POST">
    {% csrf_token %}
    
    {{ form.as_p }}
    
    <br>
    <button type="submit" class="btn" style="width: 100%;">Register</button>
    </form>
    
    <br>
    <p>Already have an account? <a href="{% url 'login' %}" style="color: #38bdf8;">Login here</a></p>
</div>
{% endblock %}
